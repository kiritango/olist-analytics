version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: olist_clickhouse
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse  
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  clickhouse_data: