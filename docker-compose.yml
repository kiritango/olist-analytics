version: '3.8'

services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: olist_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: olist_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://olist_kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@olist_kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
  
  spark:
    image: spark:latest
    container_name: olist_spark
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark:/opt/spark-apps
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST_DOCKER}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      KAFKA_BROKER: olist_kafka:9092
    depends_on:
      - kafka
      - clickhouse

  producer:
    build:
      context: .
      dockerfile: kafka/Dockerfile
    container_name: olist_producer
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST_DOCKER}
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      KAFKA_BROKER: olist_kafka:9092
    depends_on:
      - kafka
      - clickhouse
  
  airflow-webserver:
    image: apache/airflow:2.8.0-python3.10
    container_name: olist_airflow_webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    ports:
      - "8090:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./olist_dbt:/opt/dbt
      - airflow_data:/opt/airflow
    command: >
      bash -c "pip install dbt-clickhouse &&
              airflow db init &&
              airflow users create --username admin --password admin
                --firstname Admin --lastname Admin
                --role Admin --email admin@example.com || true &&
              airflow webserver"
    depends_on:
      - clickhouse

  airflow-scheduler:
    image: apache/airflow:2.8.0-python3.10
    container_name: olist_airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./olist_dbt:/opt/dbt
      - airflow_data:/opt/airflow
    command: >
      bash -c "pip install dbt-clickhouse &&
           airflow scheduler"
    depends_on:
      - airflow-webserver

volumes:
  clickhouse_data:
  kafka_data:
  airflow_data: